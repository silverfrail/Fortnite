<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a; 
            --panel-bg: #1e293b;
            --primary-blue: #3b82f6; 
            --vibrant-green: #22c55e; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --mastered-gold: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .channel-header {
            margin-bottom: 20px;
            text-align: center;
        }

        .channel-header a {
            color: var(--primary-blue);
            font-weight: bold;
            font-size: 1.2rem;
            text-decoration: none;
            border: 1px solid var(--primary-blue);
            padding: 8px 16px;
            border-radius: 6px;
            transition: background 0.3s;
        }

        .channel-header a:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        .stream-container {
            width: 80%;
            margin-bottom: 20px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--primary-blue);
        }

        .stream-container iframe {
            width: 100%;
            height: 100%;
            display: block;
        }

        h1 {
            color: var(--primary-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .controls {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        #search-bar {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--primary-blue);
            background: var(--panel-bg);
            color: white;
            width: 200px;
        }

        button {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        #export-btn { background-color: var(--primary-blue); color: white; }
        #import-btn { background-color: var(--text-muted); color: var(--bg-color); }
        button:hover { opacity: 0.8; }

        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-box {
            font-size: 1.1rem;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #collected-count { color: var(--vibrant-green); background: rgba(34, 197, 94, 0.1); }
        #mastered-count { color: var(--mastered-gold); background: rgba(245, 158, 11, 0.1); }

        .tracker-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .family-card {
            background-color: var(--panel-bg);
            border-top: 4px solid var(--primary-blue);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .family-card h2 {
            margin-top: 0;
            font-size: 1.1rem;
            color: var(--text-main);
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }

        .sprite-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 10px 0;
            padding: 5px 0;
            border-bottom: 1px solid #2d3748;
        }

        .sprite-name {
            flex-grow: 1;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .checkbox-group {
            display: flex;
            gap: 15px;
        }

        .checkbox-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .checkbox-wrapper span {
            font-size: 0.65rem;
            margin-top: 2px;
            color: var(--text-muted);
        }

        input[type="checkbox"] {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--primary-blue);
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        input[type="checkbox"].mastered-check {
            border-color: var(--mastered-gold);
        }

        input[type="checkbox"]:checked {
            background-color: var(--primary-blue);
        }

        input[type="checkbox"].mastered-check:checked {
            background-color: var(--mastered-gold);
            border-color: var(--mastered-gold);
        }

        input[type="checkbox"]:checked::after {
            content: '✓';
            position: absolute;
            color: white;
            font-size: 14px;
            font-weight: bold;
            top: -1px;
            left: 4px;
        }
    </style>
</head>
<body>

    <div class="channel-header">
        <a href="https://www.twitch.tv/silverfrailttv" target="_blank">twitch.tv/silverfrailttv</a>
    </div>

    <div class="stream-container">
        <iframe 
            src="https://player.twitch.tv/?channel=silverfrailttv&parent=silverfrail.github.io" 
            frameborder="0" 
            allowfullscreen="true" 
            scrolling="no">
        </iframe>
    </div>

    <h1>Fortnite Sprite Tracker</h1>

    <div class="controls">
        <input type="text" id="search-bar" placeholder="Search sprites...">
        <button id="export-btn">Export Data</button>
        <button id="import-btn">Import Data</button>
        <input type="file" id="fileInput" style="display:none" accept=".json">
    </div>

    <div class="stats">
        <div class="stat-box" id="collected-count">Collected: 0 / 66</div>
        <div class="stat-box" id="mastered-count">Mastered: 0 / 66</div>
    </div>

    <div class="tracker-container" id="tracker"></div>

    <script>
        const spriteData = [
            { family: "Unique", sprites: [{ name: "TheBurntPeanut", owned: true, mastered: false }] },
            { family: "Aura", sprites: [{ name: "Base Aura", owned: true, mastered: false }, { name: "Gold Aura", owned: true, mastered: false }, { name: "Gummy Aura", owned: false, mastered: false }, { name: "Galaxy Aura", owned: false, mastered: false }] },
            { family: "Boss", sprites: [{ name: "Base Boss", owned: true, mastered: false }, { name: "Gold Boss", owned: false, mastered: false }, { name: "Gummy Boss", owned: false, mastered: false }, { name: "Galaxy Boss", owned: false, mastered: false }] },
            { family: "Demon", sprites: [{ name: "Base Demon", owned: true, mastered: false }, { name: "Gold Demon", owned: true, mastered: false }, { name: "Gummy Demon", owned: true, mastered: false }, { name: "Galaxy Demon", owned: false, mastered: false }] },
            { family: "Dream", sprites: [{ name: "Base Dream", owned: true, mastered: true }, { name: "Gold Dream", owned: false, mastered: false }, { name: "Gummy Dream", owned: true, mastered: false }, { name: "Galaxy Dream", owned: false, mastered: false }] },
            { family: "Duck", sprites: [{ name: "Base Duck", owned: true, mastered: false }, { name: "Gold Duck", owned: true, mastered: false }, { name: "Gummy Duck", owned: true, mastered: false }, { name: "Galaxy Duck", owned: false, mastered: false }] },
            { family: "Earth", sprites: [{ name: "Base Earth", owned: true, mastered: false }, { name: "Gold Earth", owned: true, mastered: true }, { name: "Gummy Earth", owned: true, mastered: true }, { name: "Galaxy Earth", owned: false, mastered: false }] },
            { family: "Fire", sprites: [{ name: "Base Fire", owned: true, mastered: true }, { name: "Gold Fire", owned: true, mastered: false }, { name: "Gummy Fire", owned: true, mastered: false }, { name: "Galaxy Fire", owned: false, mastered: false }, { name: "Holofoil Fire", owned: false, mastered: false }] },
            { family: "Fishy", sprites: [{ name: "Base Fishy", owned: true, mastered: false }, { name: "Gold Fishy", owned: true, mastered: false }, { name: "Gummy Fishy", owned: false, mastered: false }, { name: "Galaxy Fishy", owned: false, mastered: false }] },
            { family: "Ghost", sprites: [{ name: "Base Ghost", owned: true, mastered: false }, { name: "Gold Ghost", owned: true, mastered: true }, { name: "Gummy Ghost", owned: true, mastered: false }, { name: "Galaxy Ghost", owned: true, mastered: false }, { name: "Holofoil Ghost", owned: false, mastered: false }] },
            { family: "King", sprites: [{ name: "Base King", owned: true, mastered: true }, { name: "Gold King", owned: true, mastered: false }, { name: "Gummy King", owned: true, mastered: false }, { name: "Galaxy King", owned: false, mastered: false }, { name: "Holofoil King", owned: false, mastered: false }] },
            { family: "Punk", sprites: [{ name: "Base Punk", owned: true, mastered: false }, { name: "Gold Punk", owned: true, mastered: true }, { name: "Gummy Punk", owned: false, mastered: false }, { name: "Galaxy Punk", owned: false, mastered: false }] },
            { family: "Striker", sprites: [{ name: "Base Striker", owned: true, mastered: false }, { name: "Gold Striker", owned: true, mastered: false }, { name: "Gummy Striker", owned: false, mastered: false }, { name: "Galaxy Striker", owned: false, mastered: false }, { name: "Holofoil Striker", owned: false, mastered: false }] },
            { family: "Water", sprites: [{ name: "Base Water", owned: true, mastered: true }, { name: "Gold Water", owned: true, mastered: false }, { name: "Gummy Water", owned: true, mastered: false }, { name: "Galaxy Water", owned: true, mastered: false }, { name: "Holofoil Water", owned: false, mastered: false }] },
            { family: "Mystery Slot 1", sprites: [{ name: "Base", owned: false, mastered: false }, { name: "Gold", owned: false, mastered: false }, { name: "Gummy", owned: false, mastered: false }, { name: "Galaxy", owned: false, mastered: false }] },
            { family: "Mystery Slot 2", sprites: [{ name: "Base", owned: false, mastered: false }, { name: "Gold", owned: false, mastered: false }, { name: "Gummy", owned: false, mastered: false }, { name: "Galaxy", owned: false, mastered: false }] }
        ];

        const trackerContainer = document.getElementById('tracker');
        const collectedDisplay = document.getElementById('collected-count');
        const masteredDisplay = document.getElementById('mastered-count');
        const fileInput = document.getElementById('fileInput');
        const searchBar = document.getElementById('search-bar');

        const updateStats = () => {
            let collected = 0;
            let mastered = 0;
            spriteData.forEach(family => {
                family.sprites.forEach(sprite => {
                    if (sprite.owned) collected++;
                    if (sprite.mastered) mastered++;
                });
            });
            collectedDisplay.innerText = `Collected: ${collected} / 66`;
            masteredDisplay.innerText = `Mastered: ${mastered} / 66`;
        };

        const saveProgress = () => {
            const saveObj = {};
            spriteData.forEach(family => {
                family.sprites.forEach(sprite => {
                    saveObj[sprite.name] = { owned: sprite.owned, mastered: sprite.mastered };
                });
            });
            localStorage.setItem('fortniteSpriteData', JSON.stringify(saveObj));
            updateStats();
        };

        const loadProgress = () => {
            const saved = localStorage.getItem('fortniteSpriteData');
            if (saved) {
                const parsed = JSON.parse(saved);
                spriteData.forEach(family => {
                    family.sprites.forEach(sprite => {
                        if (parsed[sprite.name]) {
                            sprite.owned = parsed[sprite.name].owned;
                            sprite.mastered = parsed[sprite.name].mastered;
                        }
                    });
                });
            }
        };

        // Live Search Logic
        searchBar.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.family-card');
            
            cards.forEach(card => {
                const rows = card.querySelectorAll('.sprite-row');
                let hasVisible = false;
                
                rows.forEach(row => {
                    const name = row.querySelector('.sprite-name').innerText.toLowerCase();
                    if (name.includes(query)) {
                        row.style.display = 'flex';
                        hasVisible = true;
                    } else {
                        row.style.display = 'none';
                    }
                });
                
                card.style.display = hasVisible ? 'block' : 'none';
            });
        });

        document.getElementById('export-btn').addEventListener('click', () => {
            const data = localStorage.getItem('fortniteSpriteData');
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'my-sprite-data.json';
            a.click();
        });

        document.getElementById('import-btn').addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const importedData = JSON.parse(event.target.result);
                    localStorage.setItem('fortniteSpriteData', JSON.stringify(importedData));
                    location.reload();
                } catch (err) {
                    alert('Invalid JSON file.');
                }
            };
            reader.readAsText(file);
        });

        const renderTracker = () => {
            trackerContainer.innerHTML = '';
            spriteData.forEach((family, fIndex) => {
                const card = document.createElement('div');
                card.className = 'family-card';
                const title = document.createElement('h2');
                title.innerText = family.family;
                card.appendChild(title);
                
                family.sprites.forEach((sprite, sIndex) => {
                    const row = document.createElement('div');
                    row.className = 'sprite-row';
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'sprite-name';
                    nameSpan.innerText = sprite.name;
                    row.appendChild(nameSpan);
                    
                    const checkGroup = document.createElement('div');
                    checkGroup.className = 'checkbox-group';
                    
                    const ownedWrap = document.createElement('label');
                    ownedWrap.className = 'checkbox-wrapper';
                    const ownedCheck = document.createElement('input');
                    ownedCheck.type = 'checkbox';
                    ownedCheck.checked = sprite.owned;
                    ownedCheck.addEventListener('change', (e) => {
                        sprite.owned = e.target.checked;
                        saveProgress();
                    });
                    ownedWrap.appendChild(ownedCheck);
                    ownedWrap.appendChild(document.createElement('span')).innerText = "Owned";
                    checkGroup.appendChild(ownedWrap);
                    
                    const mastWrap = document.createElement('label');
                    mastWrap.className = 'checkbox-wrapper';
                    const mastCheck = document.createElement('input');
                    mastCheck.type = 'checkbox';
                    mastCheck.className = 'mastered-check';
                    mastCheck.checked = sprite.mastered;
                    mastCheck.addEventListener('change', (e) => {
                        sprite.mastered = e.target.checked;
                        saveProgress();
                    });
                    mastWrap.appendChild(mastCheck);
                    mastWrap.appendChild(document.createElement('span')).innerText = "Mastered";
                    checkGroup.appendChild(mastWrap);
                    
                    row.appendChild(checkGroup);
                    card.appendChild(row);
                });
                trackerContainer.appendChild(card);
            });
        };

        loadProgress();
        renderTracker();
        updateStats();
    </script>
</body>
</html>
