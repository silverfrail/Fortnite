<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprite Tracker</title>
    <style>
        :root {
            --bg-color: #0f172a; 
            --panel-bg: #1e293b;
            --primary-blue: #3b82f6; 
            --vibrant-green: #22c55e; 
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --mastered-gold: #f59e0b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Hamburger and Menu Styles */
        .hamburger {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 24px;
            cursor: pointer;
            z-index: 1002;
            background: var(--panel-bg);
            padding: 5px 15px;
            border-radius: 6px;
            border: 1px solid var(--primary-blue);
        }

        .backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
        }

        .backdrop.open { display: block; }

        .side-menu {
            position: fixed;
            top: 0;
            right: -300px;
            width: 250px;
            height: 100%;
            background: var(--panel-bg);
            box-shadow: -2px 0 10px rgba(0,0,0,0.5);
            z-index: 1001;
            transition: right 0.3s ease;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .side-menu.open { right: 0; }

        .menu-btn {
            background: none;
            border: 1px solid var(--primary-blue);
            color: white;
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            text-align: left;
        }

        .sub-menu {
            display: none;
            flex-direction: column;
            gap: 10px;
            padding-left: 15px;
        }

        .sub-menu.open { display: flex; }

        .channel-header { margin-bottom: 20px; text-align: center; }
        .channel-header a { color: var(--primary-blue); font-weight: bold; font-size: 1.2rem; text-decoration: none; border: 1px solid var(--primary-blue); padding: 8px 16px; border-radius: 6px; }

        .stream-container {
            width: 90%; 
            max-width: 800px;
            margin-bottom: 10px; /* Reduced space */
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid var(--primary-blue);
        }

        .stream-container iframe { width: 100%; height: 100%; display: block; }

        h1 { color: var(--primary-blue); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; text-align: center; }

        .controls { margin-bottom: 20px; display: flex; justify-content: center; width: 100%; }
        #search-bar { padding: 8px 12px; border-radius: 6px; border: 1px solid var(--primary-blue); background: var(--panel-bg); color: white; width: 100%; max-width: 300px; }

        .stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-box { font-size: 1.1rem; font-weight: bold; padding: 8px 16px; border-radius: 6px; border: 1px solid rgba(255, 255, 255, 0.1); }
        #collected-count { color: var(--vibrant-green); background: rgba(34, 197, 94, 0.1); }
        #mastered-count { color: var(--mastered-gold); background: rgba(245, 158, 11, 0.1); }

        .tracker-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .family-card { background-color: var(--panel-bg); border-top: 4px solid var(--primary-blue); border-radius: 8px; padding: 15px; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); }
        .family-card h2 { margin: 0; font-size: 1.1rem; color: var(--text-main); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .family-card.open .card-content { display: flex; }
        .card-content { display: none; flex-direction: column; }
        .sprite-row { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; padding: 5px 0; border-bottom: 1px solid #2d3748; }
        .sprite-name { flex-grow: 1; font-size: 0.9rem; color: var(--text-muted); }
        
        input[type="checkbox"] { appearance: none; width: 20px; height: 20px; border: 2px solid var(--primary-blue); border-radius: 4px; cursor: pointer; position: relative; }
        input[type="checkbox"].mastered-check { border-color: var(--mastered-gold); }
        input[type="checkbox"]:checked { background-color: var(--primary-blue); }
        input[type="checkbox"].mastered-check:checked { background-color: var(--mastered-gold); border-color: var(--mastered-gold); }
        input[type="checkbox"]:checked::after { content: '✓'; position: absolute; color: white; top: -1px; left: 4px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="hamburger" id="hamburger">☰</div>
    <div class="backdrop" id="backdrop"></div>

    <div class="side-menu" id="side-menu">
        <button class="menu-btn" id="export-btn">Export Data</button>
        <button class="menu-btn" id="import-btn">Import Data</button>
        <button class="menu-btn" id="org-toggle">Organization Methods ▼</button>
        <div class="sub-menu" id="sub-menu">
            <button class="menu-btn" onclick="setGroup('family')">By Family</button>
            <button class="menu-btn" onclick="setGroup('version')">By Version</button>
            <button class="menu-btn" onclick="setGroup('mastered')">By Mastery</button>
            <button class="menu-btn" onclick="setGroup('owned')">By Owned</button>
        </div>
    </div>

    <div class="channel-header">
        <a href="https://www.twitch.tv/silverfrailttv" target="_blank">twitch.tv/silverfrailttv</a>
    </div>

    <div class="stream-container">
        <iframe src="https://player.twitch.tv/?channel=silverfrailttv&parent=silverfrail.github.io" frameborder="0" allowfullscreen="true" scrolling="no"></iframe>
    </div>

    <h1>Fortnite Sprite Tracker</h1>

    <div class="controls">
        <input type="text" id="search-bar" placeholder="Search sprites...">
        <input type="file" id="fileInput" style="display:none" accept=".json">
    </div>

    <div class="stats">
        <div class="stat-box" id="collected-count">Collected: 0 / 66</div>
        <div class="stat-box" id="mastered-count">Mastered: 0 / 66</div>
    </div>

    <div class="tracker-container" id="tracker"></div>

    <script>
        let currentGroup = 'family';
        
        const spriteData = [
            { family: "Unique", sprites: [{ name: "TheBurntPeanut", owned: true, mastered: false }] },
            { family: "Aura", sprites: [{ name: "Base Aura", owned: true, mastered: false }, { name: "Gold Aura", owned: true, mastered: false }, { name: "Gummy Aura", owned: false, mastered: false }, { name: "Galaxy Aura", owned: false, mastered: false }] },
            { family: "Boss", sprites: [{ name: "Base Boss", owned: true, mastered: false }, { name: "Gold Boss", owned: false, mastered: false }, { name: "Gummy Boss", owned: false, mastered: false }, { name: "Galaxy Boss", owned: false, mastered: false }] },
            { family: "Demon", sprites: [{ name: "Base Demon", owned: true, mastered: false }, { name: "Gold Demon", owned: true, mastered: false }, { name: "Gummy Demon", owned: true, mastered: false }, { name: "Galaxy Demon", owned: false, mastered: false }] },
            { family: "Dream", sprites: [{ name: "Base Dream", owned: true, mastered: true }, { name: "Gold Dream", owned: false, mastered: false }, { name: "Gummy Dream", owned: true, mastered: false }, { name: "Galaxy Dream", owned: false, mastered: false }] },
            { family: "Duck", sprites: [{ name: "Base Duck", owned: true, mastered: false }, { name: "Gold Duck", owned: true, mastered: false }, { name: "Gummy Duck", owned: true, mastered: false }, { name: "Galaxy Duck", owned: false, mastered: false }] },
            { family: "Earth", sprites: [{ name: "Base Earth", owned: true, mastered: false }, { name: "Gold Earth", owned: true, mastered: true }, { name: "Gummy Earth", owned: true, mastered: true }, { name: "Galaxy Earth", owned: false, mastered: false }] },
            { family: "Fire", sprites: [{ name: "Base Fire", owned: true, mastered: true }, { name: "Gold Fire", owned: true, mastered: false }, { name: "Gummy Fire", owned: true, mastered: false }, { name: "Galaxy Fire", owned: false, mastered: false }, { name: "Holofoil Fire", owned: false, mastered: false }] },
            { family: "Fishy", sprites: [{ name: "Base Fishy", owned: true, mastered: false }, { name: "Gold Fishy", owned: true, mastered: false }, { name: "Gummy Fishy", owned: false, mastered: false }, { name: "Galaxy Fishy", owned: false, mastered: false }] },
            { family: "Ghost", sprites: [{ name: "Base Ghost", owned: true, mastered: false }, { name: "Gold Ghost", owned: true, mastered: true }, { name: "Gummy Ghost", owned: true, mastered: false }, { name: "Galaxy Ghost", owned: true, mastered: false }, { name: "Holofoil Ghost", owned: false, mastered: false }] },
            { family: "King", sprites: [{ name: "Base King", owned: true, mastered: true }, { name: "Gold King", owned: true, mastered: false }, { name: "Gummy King", owned: true, mastered: false }, { name: "Galaxy King", owned: false, mastered: false }, { name: "Holofoil King", owned: false, mastered: false }] },
            { family: "Punk", sprites: [{ name: "Base Punk", owned: true, mastered: false }, { name: "Gold Punk", owned: true, mastered: true }, { name: "Gummy Punk", owned: false, mastered: false }, { name: "Galaxy Punk", owned: false, mastered: false }] },
            { family: "Striker", sprites: [{ name: "Base Striker", owned: true, mastered: false }, { name: "Gold Striker", owned: true, mastered: false }, { name: "Gummy Striker", owned: false, mastered: false }, { name: "Galaxy Striker", owned: false, mastered: false }, { name: "Holofoil Striker", owned: false, mastered: false }] },
            { family: "Water", sprites: [{ name: "Base Water", owned: true, mastered: true }, { name: "Gold Water", owned: true, mastered: false }, { name: "Gummy Water", owned: true, mastered: false }, { name: "Galaxy Water", owned: true, mastered: false }, { name: "Holofoil Water", owned: false, mastered: false }] },
            { family: "Mystery Slot 1", sprites: [{ name: "Base", owned: false, mastered: false }, { name: "Gold", owned: false, mastered: false }, { name: "Gummy", owned: false, mastered: false }, { name: "Galaxy", owned: false, mastered: false }] },
            { family: "Mystery Slot 2", sprites: [{ name: "Base", owned: false, mastered: false }, { name: "Gold", owned: false, mastered: false }, { name: "Gummy", owned: false, mastered: false }, { name: "Galaxy", owned: false, mastered: false }] }
        ];

        const hamburger = document.getElementById('hamburger');
        const sideMenu = document.getElementById('side-menu');
        const backdrop = document.getElementById('backdrop');
        const orgToggle = document.getElementById('org-toggle');
        const subMenu = document.getElementById('sub-menu');

        const toggleMenu = () => {
            sideMenu.classList.toggle('open');
            backdrop.classList.toggle('open');
        };

        hamburger.addEventListener('click', toggleMenu);
        backdrop.addEventListener('click', toggleMenu);
        orgToggle.addEventListener('click', () => subMenu.classList.toggle('open'));

        const setGroup = (val) => {
            currentGroup = val;
            localStorage.setItem('fortniteSpriteLayout', val);
            renderTracker();
            toggleMenu();
        };

        const updateStats = () => {
            let collected = 0, mastered = 0;
            spriteData.forEach(f => f.sprites.forEach(s => { if(s.owned) collected++; if(s.mastered) mastered++; }));
            document.getElementById('collected-count').innerText = `Collected: ${collected} / 66`;
            document.getElementById('mastered-count').innerText = `Mastered: ${mastered} / 66`;
        };

        const saveProgress = () => {
            const saveObj = {};
            spriteData.forEach(f => f.sprites.forEach(s => saveObj[s.name] = { owned: s.owned, mastered: s.mastered }));
            localStorage.setItem('fortniteSpriteData', JSON.stringify(saveObj));
            updateStats();
        };

        const loadProgress = () => {
            const savedData = localStorage.getItem('fortniteSpriteData');
            if (savedData) {
                const parsed = JSON.parse(savedData);
                spriteData.forEach(f => f.sprites.forEach(s => { if (parsed[s.name]) { s.owned = parsed[s.name].owned; s.mastered = parsed[s.name].mastered; } }));
            }
            currentGroup = localStorage.getItem('fortniteSpriteLayout') || 'family';
        };

        const applySearch = () => {
            const query = document.getElementById('search-bar').value.toLowerCase();
            document.querySelectorAll('.family-card').forEach(card => {
                const rows = card.querySelectorAll('.sprite-row');
                let hasVisible = false;
                rows.forEach(row => {
                    const match = row.querySelector('.sprite-name').innerText.toLowerCase().includes(query);
                    row.style.display = match ? 'flex' : 'none';
                    if (match) hasVisible = true;
                });
                card.style.display = (hasVisible || query === '') ? 'block' : 'none';
                if (hasVisible && query !== '') card.classList.add('open');
            });
        };

        document.getElementById('search-bar').addEventListener('input', applySearch);

        const renderTracker = () => {
            const trackerContainer = document.getElementById('tracker');
            trackerContainer.innerHTML = '';
            let renderGroups = [];

            if (currentGroup === 'family') {
                renderGroups = spriteData.map(f => ({ title: f.family, items: f.sprites.map(s => ({ sprite: s, family: f.family })) }));
            } else if (currentGroup === 'version') {
                const vMap = { "Unique": [], "Base": [], "Gold": [], "Gummy": [], "Galaxy": [], "Holofoil": [], "Other": [] };
                spriteData.forEach(f => f.sprites.forEach(s => { 
                    const v = (f.family === "Unique") ? "Unique" : (s.name.split(' ')[0] || "Other");
                    if (vMap[v]) vMap[v].push({ sprite: s, family: f.family }); else vMap["Other"].push({ sprite: s, family: f.family });
                }));
                Object.keys(vMap).forEach(v => { if (vMap[v].length > 0) renderGroups.push({ title: v + " Variants", items: vMap[v] }); });
            } else if (currentGroup === 'mastered') {
                const mMap = { "Mastered": [], "Unmastered": [] };
                spriteData.forEach(f => f.sprites.forEach(s => s.mastered ? mMap["Mastered"].push({ sprite: s, family: f.family }) : mMap["Unmastered"].push({ sprite: s, family: f.family })));
                renderGroups.push({ title: "Mastered", items: mMap["Mastered"] }, { title: "Unmastered", items: mMap["Unmastered"] });
            } else {
                const oMap = { "Owned": [], "Not Owned": [] };
                spriteData.forEach(f => f.sprites.forEach(s => s.owned ? oMap["Owned"].push({ sprite: s, family: f.family }) : oMap["Not Owned"].push({ sprite: s, family: f.family })));
                renderGroups.push({ title: "Owned", items: oMap["Owned"] }, { title: "Not Owned", items: oMap["Not Owned"] });
            }

            renderGroups.forEach(group => {
                if (group.items.length === 0) return;
                const card = document.createElement('div');
                card.className = 'family-card';
                card.innerHTML = `<h2>${group.title}</h2><div class="card-content"></div>`;
                card.querySelector('h2').addEventListener('click', () => card.classList.toggle('open'));
                const container = card.querySelector('.card-content');

                group.items.forEach(item => {
                    const row = document.createElement('div');
                    row.className = 'sprite-row';
                    row.innerHTML = `<span class="sprite-name">${(currentGroup !== 'family' && !item.sprite.name.includes(item.family)) ? item.family + ' ' : ''}${item.sprite.name}</span>
                                     <div style="display:flex; gap:10px;">
                                        <label class="checkbox-wrapper" style="display:flex; flex-direction:column; align-items:center;"><input type="checkbox" ${item.sprite.owned ? 'checked' : ''}><span style="font-size:0.65rem; color:#94a3b8;">Owned</span></label>
                                        <label class="checkbox-wrapper" style="display:flex; flex-direction:column; align-items:center;"><input type="checkbox" class="mastered-check" ${item.sprite.mastered ? 'checked' : ''}><span style="font-size:0.65rem; color:#94a3b8;">Mastered</span></label>
                                     </div>`;
                    row.querySelectorAll('input')[0].addEventListener('change', (e) => { item.sprite.owned = e.target.checked; saveProgress(); });
                    row.querySelectorAll('input')[1].addEventListener('change', (e) => { item.sprite.mastered = e.target.checked; saveProgress(); });
                    container.appendChild(row);
                });
                trackerContainer.appendChild(card);
            });
            applySearch();
        };

        document.getElementById('export-btn').addEventListener('click', () => {
            const blob = new Blob([localStorage.getItem('fortniteSpriteData')], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'sprite-data.json'; a.click();
        });

        document.getElementById('import-btn').addEventListener('click', () => document.getElementById('fileInput').click());
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const reader = new FileReader();
            reader.onload = (ev) => { localStorage.setItem('fortniteSpriteData', ev.target.result); location.reload(); };
            reader.readAsText(e.target.files[0]);
        });

        loadProgress();
        renderTracker();
        updateStats();
    </script>
</body>
</html>
